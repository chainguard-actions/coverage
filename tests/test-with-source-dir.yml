name: Test coverage with sourceDir input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/2/merge
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up source directory fixture
        run: |
          mkdir -p /tmp/myproject/src
          cp $GITHUB_WORKSPACE/actions/hardened/orgoro--coverage/v3.3/tests/fixtures/coverage.xml /tmp/myproject/coverage.xml
      - id: action
        uses: .
        continue-on-error: true
        with:
          coverageFile: /tmp/myproject/coverage.xml
          token: fake-token-for-testing
          thresholdAll: "0.5"
          thresholdNew: "0.0"
          thresholdModified: "0.0"
          sourceDir: /tmp/myproject/src
          title: "Coverage Report"
      - name: Assert action was invoked with sourceDir
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          # The action may fail because it's not in a real PR context with a valid token,
          # but it should have been invoked with all inputs including sourceDir.
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action step was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action was invoked with coverageFile, token, and sourceDir inputs"

name: Test coverage with sourceDir input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/1/merge
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up source directory and coverage file
        run: |
          mkdir -p /tmp/myproject/src
          echo "# main" > /tmp/myproject/src/main.py
          cp $GITHUB_WORKSPACE/actions/hardened/orgoro--coverage/v3.3.1/tests/fixtures/coverage.xml /tmp/myproject/coverage.xml
      - id: action
        uses: .
        with:
          coverageFile: /tmp/myproject/coverage.xml
          token: ${{ github.token }}
          sourceDir: /tmp/myproject
          thresholdAll: 0.0
          thresholdNew: 0.0
          thresholdModified: 0.0
          title: 'Coverage Report - Source Dir Test'
        continue-on-error: true
      - name: Assert action ran with sourceDir
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          echo "PASS: action step with sourceDir completed (may fail to post PR comment without real PR context)"

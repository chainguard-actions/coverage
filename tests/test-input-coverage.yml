name: Test all inputs coverage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/1/merge
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Prepare coverage file and source directory
        run: |
          mkdir -p /tmp/testproject/src
          echo "# sample" > /tmp/testproject/src/main.py
          cp $GITHUB_WORKSPACE/actions/hardened/orgoro--coverage/v3.3.1/tests/fixtures/coverage.xml /tmp/testproject/coverage.xml
      - id: action
        uses: .
        with:
          coverageFile: /tmp/testproject/coverage.xml
          token: ${{ github.token }}
          sourceDir: /tmp/testproject
          thresholdAll: 0.0
          thresholdNew: 0.0
          thresholdModified: 0.0
          title: 'Code Coverage'
        continue-on-error: true
      - name: Assert action completed
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          echo "PASS: all inputs were accepted by the action"

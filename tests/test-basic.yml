name: Test basic coverage reporting
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/1/merge
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Copy fixture coverage file
        run: |
          cp $GITHUB_WORKSPACE/actions/hardened/orgoro--coverage/v3.3.1/tests/fixtures/coverage.xml /tmp/coverage.xml
      - id: action
        uses: .
        with:
          coverageFile: /tmp/coverage.xml
          token: ${{ github.token }}
          thresholdAll: 0.0
          thresholdNew: 0.0
          thresholdModified: 0.0
        continue-on-error: true
      - name: Assert action ran
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          echo "PASS: action step completed (may fail to post PR comment without real PR context)"

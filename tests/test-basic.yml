name: Test basic coverage inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/1/merge
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          coverageFile: ${{ github.workspace }}/actions/hardened/orgoro--coverage/v3.1/tests/fixtures/coverage.xml
          token: fake-token-for-testing
          thresholdAll: 0.0
          thresholdNew: 0.0
          thresholdModified: 0.0
        continue-on-error: true
      - name: Assert action ran (inputs were accepted)
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          # The action may fail due to invalid token/PR context, but it must have started
          # (i.e., inputs were accepted and the action was invoked)
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped, inputs may not have been accepted"
            exit 1
          fi
          echo "PASS: action ran with required inputs"

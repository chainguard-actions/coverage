name: Test basic usage with required inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/1/merge
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up coverage file path
        id: setup
        run: |
          COVERAGE_FILE="$GITHUB_WORKSPACE/actions/hardened/orgoro--coverage/v3.1/tests/fixtures/coverage.xml"
          echo "coverage_file=$COVERAGE_FILE" >> "$GITHUB_OUTPUT"
          echo "Coverage file: $COVERAGE_FILE"
          ls -la "$COVERAGE_FILE"
      - id: action
        uses: .
        continue-on-error: true
        with:
          coverageFile: ${{ steps.setup.outputs.coverage_file }}
          token: fake-token-for-testing
          thresholdAll: 0.0
          thresholdNew: 0.0
          thresholdModified: 0.0
      - name: Assert action ran (inputs were accepted)
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          # The action may fail due to missing GitHub API access (fake token),
          # but it should not fail due to missing required inputs.
          # We verify the inputs were accepted by checking the action was invoked.
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action was invoked with required inputs coverageFile and token"
